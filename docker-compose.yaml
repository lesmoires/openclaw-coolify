services:
  registry:
    image: registry:2
    restart: unless-stopped
    volumes:
      - registry-data:/var/lib/registry
  openclaw:
    build:
      context: .
    restart: on-failure:10
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "18789:18789"
    environment:
      PORT: 18789
      NODE_ENV: production
      KIMI_API_KEY: ${KIMI_API_KEY}
    volumes:
      - openclaw-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/__openclaw__/canvas/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
volumes:
  openclaw-data:
  registry-data:

